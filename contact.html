<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - The Global Express</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            font-family: 'Segoe UI', sans-serif;
        }

        .contact-box{
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .title{
            color: #0f172a;
            font-weight: 700;
        }

        .form-control{
            border-radius: 10px;
            padding: 12px;
        }

        .btn-custom{
            background: #0d6efd;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-custom:hover{
            background: #084298;
            transform: scale(1.02);
        }

        .info-box{
            color: white;
            padding: 20px;
        }

        .info-box h3{
            color: #facc15;
        }

        .icon{
            font-size: 22px;
            margin-right: 10px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="row g-4 align-items-center">

        <!-- CONTACT FORM -->
        <div class="col-lg-7">
            <div class="contact-box">

                <h2 class="title text-center mb-4">
                    Contact Us
                </h2>

                <form>

                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Your Name" required>
                    </div>

                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Your Email" required>
                    </div>

                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Subject" required>
                    </div>

                    <div class="mb-3">
                        <textarea class="form-control" rows="5" placeholder="Your Message" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-custom w-100 text-white">
                        Send Message
                    </button>

                </form>

            </div>
        </div>

        <!-- CONTACT INFO -->
        <div class="col-lg-5">

            <div class="info-box">

                <h3>Get in Touch</h3>
                <p>We are always here to help you. Reach us anytime.</p>

                <p>
                    📍 Address: Muzaffarnagar, Uttar Pradesh, India
                </p>

                <p>
                    📧 Email: support@globalexpress.com
                </p>

                <p>
                    📞 Phone: +91 98765 43210
                </p>

                <hr style="background:white;">

                <p>
                    🕒 Monday - Saturday: 9 AM - 6 PM
                </p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
