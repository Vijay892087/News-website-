<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Become Member</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#1e293b,#0f172a);
}
.form-box{
    background:white;
    padding:30px;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="form-box">

                <h2 class="text-center mb-4">Become a Member</h2>

                <form onsubmit="return submitForm()">

                    <input type="text" class="form-control mb-3" placeholder="Full Name" required>

                    <input type="email" class="form-control mb-3" placeholder="Email" required>

                    <input type="tel" class="form-control mb-3" placeholder="Mobile Number" required>

                    <select class="form-control mb-3" required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>

                    <textarea class="form-control mb-3" rows="4" placeholder="Address"></textarea>

                    <button class="btn btn-primary w-100">Submit</button>

                </form>

            </div>

        </div>

    </div>

</div>

<script>
function submitForm(){
    alert("🎉 Membership Request Submitted Successfully!");
    return false;
}
</script>

</body>
</html>
